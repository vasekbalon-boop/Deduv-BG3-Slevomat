# Ulož jako .github/workflows/sale-watch.yml
name: BG3 sale watch

on:
  schedule:
    # Časy jsou v UTC, GitHub jiné pásmo neumí (v zimě to poskočí o hodinu zpět).
    # 18:30 UTC = 20:30 SELČ (léto) / 19:30 SEČ (zima).
    # GitHub cron se běžně opozdí o 10–30 min a pod zátěží běh občas vynechá,
    # proto raději dva časy denně než jeden.
    - cron: "30 18 * * *"
    - cron: "30 8 * * *"

  workflow_dispatch:         # ruční spuštění ze záložky Actions
    inputs:
      force:
        description: "Poslat testovací zprávu bez ohledu na slevu"
        type: boolean
        default: false
      reset:
        description: "Vynulovat počítadlo připomínek (po koupi hry)"
        type: boolean
        default: false

permissions:
  contents: write            # kvůli commitu state.json zpátky do repa

concurrency:
  group: sale-watch          # ať se dva běhy nikdy neperou o state.json
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Kontrola ceny na Steamu
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TARGET_USER_ID: ${{ secrets.TARGET_USER_ID }}
          STEAM_APP_ID: "1086940"    # Baldur's Gate 3
          STEAM_CC: "cz"
          MIN_DISCOUNT: "20"         # Larian slevuje mělce, zvaž "10"
          FORCE_NOTIFY: ${{ inputs.force }}
          RESET_COUNTER: ${{ inputs.reset }}
        run: python check_sale.py

      # if: always() je klíčové — když spadne Steam nebo Discord, musí se
      # čerstvý last_check stejně commitnout, jinak GitHub po 60 dnech
      # nečinnosti naplánovaný workflow vypne. Přesně ve chvíli, kdy je rozbitý.
      - name: Uložit stav
        if: always()
        run: |
          git config user.name  "sale-watch[bot]"
          git config user.email "sale-watch@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet && { echo "Stav beze změny."; exit 0; }
          git commit -m "state: $(date -u +%F\ %H:%M)"

          # Kdyby mezitím někdo pushnul, ať to nespadne na non-fast-forward.
          for attempt in 1 2 3; do
            git pull --rebase --autostash && git push && exit 0
            git rebase --abort 2>/dev/null || true
            echo "Push selhal (pokus $attempt/3), zkouším znovu za 5 s."
            sleep 5
          done
          echo "::error::Nepodařilo se uložit state.json do repozitáře."
          exit 1
